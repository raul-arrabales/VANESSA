services:
  llm_runtime:
    build:
      context: ..
      dockerfile: infra/docker/llm_runtime/Dockerfile.cpu
      args:
        VLLM_VERSION: ${LLM_RUNTIME_CPU_VLLM_VERSION:-v0.8.5}
        VLLM_CPU_DISABLE_AVX512: ${LLM_RUNTIME_CPU_BUILD_DISABLE_AVX512:-true}
        VLLM_CPU_AVX2: ${LLM_RUNTIME_CPU_BUILD_AVX2:-true}
        VLLM_CPU_AVX512: ${LLM_RUNTIME_CPU_BUILD_AVX512:-false}
    image: ${LLM_RUNTIME_CPU_IMAGE:-vanessa-llm-runtime-cpu:local}
    command:
      - --device
      - ${LLM_RUNTIME_DEVICE:-cpu}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${LLM_LOCAL_MODEL_PATH:-/models/llm/tinyllama}
      - --dtype
      - ${LLM_RUNTIME_DTYPE:-float}
    shm_size: ${LLM_RUNTIME_SHM_SIZE:-4g}
    cap_add:
      - SYS_NICE
    security_opt:
      - seccomp=unconfined
    environment:
      VLLM_CPU_KVCACHE_SPACE: ${VLLM_CPU_KVCACHE_SPACE:-8}
      VLLM_CPU_OMP_THREADS_BIND: ${VLLM_CPU_OMP_THREADS_BIND:-}
