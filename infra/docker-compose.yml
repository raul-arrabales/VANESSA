services:
  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend/Dockerfile
    container_name: vanessa-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend/Dockerfile
    container_name: vanessa-backend
    ports:
      - "5000:5000"
    depends_on:
      - agent_engine
      - weaviate
      - postgres
      - llm
      - sandbox
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    volumes:
      - ../models/llm:/models/llm
      - ../context_sources:/context_sources
      - ../chat_attachments:/var/lib/vanessa/chat-attachments
      - ../logs:/var/log/vanessa
      - /var/run/docker.sock:/var/run/docker.sock:ro

  llm:
    build:
      context: ..
      dockerfile: infra/docker/llm/Dockerfile
    container_name: vanessa-llm
    ports:
      - "8000:8000"
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    depends_on:
      - llm_runtime_inference
      - llm_runtime_embeddings

  llm_runtime_inference:
    build:
      context: ..
      dockerfile: infra/docker/llm_runtime/Dockerfile.gpu
    image: ${LLM_RUNTIME_GPU_IMAGE:-vanessa-llm-runtime-gpu:local}
    container_name: vanessa-llm-runtime-inference
    expose:
      - "8000"
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    environment:
      LLM_RUNTIME_SERVICE_NAME: llm_runtime_inference
      LLM_RUNTIME_CAPABILITY: llm_inference
      LLM_RUNTIME_DTYPE: ${LLM_RUNTIME_GPU_DTYPE:-auto}
      LLM_RUNTIME_CONTROLLER_PORT: 8000
      LLM_RUNTIME_CHILD_PORT: 8001
      LLM_LOCAL_UPSTREAM_MODEL: ${LLM_LOCAL_UPSTREAM_MODEL:-/models/llm/Qwen--Qwen2.5-0.5B-Instruct}
      LLM_INFERENCE_LOCAL_MODEL_PATH: ${LLM_INFERENCE_LOCAL_MODEL_PATH:-${LLM_LOCAL_MODEL_PATH:-/models/llm/Qwen--Qwen2.5-0.5B-Instruct}}
    volumes:
      - ../models/llm:/models/llm

  llm_runtime_embeddings:
    build:
      context: ..
      dockerfile: infra/docker/llm_runtime/Dockerfile.gpu
    image: ${LLM_RUNTIME_GPU_IMAGE:-vanessa-llm-runtime-gpu:local}
    container_name: vanessa-llm-runtime-embeddings
    expose:
      - "8000"
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    environment:
      LLM_RUNTIME_SERVICE_NAME: llm_runtime_embeddings
      LLM_RUNTIME_CAPABILITY: embeddings
      LLM_RUNTIME_DTYPE: ${LLM_RUNTIME_GPU_DTYPE:-auto}
      LLM_RUNTIME_CONTROLLER_PORT: 8000
      LLM_RUNTIME_CHILD_PORT: 8001
      LLM_LOCAL_EMBEDDINGS_UPSTREAM_MODEL: ${LLM_LOCAL_EMBEDDINGS_UPSTREAM_MODEL:-}
      LLM_EMBEDDINGS_LOCAL_MODEL_PATH: ${LLM_EMBEDDINGS_LOCAL_MODEL_PATH:-}
    volumes:
      - ../models/llm:/models/llm

  llama_cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: vanessa-llama-cpp
    profiles:
      - llama_cpp
    ports:
      - "8081:8080"
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    environment:
      LLAMA_ARG_MODEL: ${LLAMA_CPP_MODEL_PATH:-}
      LLAMA_ARG_ALIAS: local-llama-cpp-default
      LLAMA_ARG_CTX_SIZE: ${LLAMA_CPP_CONTEXT_SIZE:-4096}
      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_PORT: 8080
    volumes:
      - ../models/llm:/models/llm

  qdrant:
    image: qdrant/qdrant:latest
    container_name: vanessa-qdrant
    profiles:
      - qdrant
    ports:
      - "6333:6333"
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    volumes:
      - qdrant_data:/qdrant/storage

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: vanessa-searxng
    expose:
      - "8080"
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-me-local-searxng-secret}
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng_data:/var/cache/searxng

  mcp_gateway:
    build:
      context: ..
      dockerfile: infra/docker/mcp_gateway/Dockerfile
    container_name: vanessa-mcp-gateway
    ports:
      - "6100:8080"
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    environment:
      MCP_GATEWAY_PORT: 8080
      BACKEND_URL: http://backend:5000
      MCP_GATEWAY_SERVICE_TOKEN: ${MCP_GATEWAY_SERVICE_TOKEN:-dev-mcp-gateway-token}
    depends_on:
      - backend

  image_analysis:
    build:
      context: ..
      dockerfile: infra/docker/image_analysis/Dockerfile
      target: gateway
      args:
        IMAGE_ANALYSIS_INSTALL_RUNTIME_DEPS: "0"
    image: vanessa-image-analysis-gateway:local
    container_name: vanessa-image-analysis
    profiles:
      - image_analysis
    ports:
      - "8090:8090"
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    environment:
      IMAGE_ANALYSIS_ROLE: gateway
      IMAGE_ANALYSIS_PORT: 8090
      IMAGE_ANALYSIS_MODEL_ROOT: /models/image_analysis
      IMAGE_ANALYSIS_FAKE_MODE: ${IMAGE_ANALYSIS_FAKE_MODE:-0}
      IMAGE_ANALYSIS_WORKERS: ${IMAGE_ANALYSIS_WORKERS:-anpr,objects,captioning}
      IMAGE_ANALYSIS_ANPR_URL: ${IMAGE_ANALYSIS_ANPR_URL:-http://image_analysis_anpr:8091}
      IMAGE_ANALYSIS_OBJECTS_URL: ${IMAGE_ANALYSIS_OBJECTS_URL:-http://image_analysis_objects:8092}
      IMAGE_ANALYSIS_CAPTIONING_URL: ${IMAGE_ANALYSIS_CAPTIONING_URL:-http://image_analysis_captioning:8093}
      HF_HOME: /models/image_analysis/gateway/huggingface
      TORCH_HOME: /models/image_analysis/gateway/torch
      XDG_CACHE_HOME: /models/image_analysis/gateway/cache
      MPLCONFIGDIR: /tmp/matplotlib
    volumes:
      - ../models/image_analysis:/models/image_analysis

  image_analysis_anpr:
    build:
      context: ..
      dockerfile: infra/docker/image_analysis/Dockerfile
      target: anpr
      args:
        IMAGE_ANALYSIS_INSTALL_RUNTIME_DEPS: ${IMAGE_ANALYSIS_INSTALL_RUNTIME_DEPS:-0}
    image: vanessa-image-analysis-anpr:local
    container_name: vanessa-image-analysis-anpr
    profiles:
      - image_analysis
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    environment:
      IMAGE_ANALYSIS_ROLE: anpr
      IMAGE_ANALYSIS_PORT: 8091
      IMAGE_ANALYSIS_MODEL_ROOT: /models/image_analysis/anpr
      IMAGE_ANALYSIS_FAKE_MODE: ${IMAGE_ANALYSIS_FAKE_MODE:-0}
      HF_HOME: /models/image_analysis/anpr/huggingface
      TORCH_HOME: /models/image_analysis/anpr/torch
      XDG_CACHE_HOME: /models/image_analysis/anpr/cache
      MPLCONFIGDIR: /tmp/matplotlib
    volumes:
      - ../models/image_analysis:/models/image_analysis

  image_analysis_objects:
    build:
      context: ..
      dockerfile: infra/docker/image_analysis/Dockerfile
      target: objects
      args:
        IMAGE_ANALYSIS_INSTALL_RUNTIME_DEPS: ${IMAGE_ANALYSIS_INSTALL_RUNTIME_DEPS:-0}
    image: vanessa-image-analysis-objects:local
    container_name: vanessa-image-analysis-objects
    profiles:
      - image_analysis
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    environment:
      IMAGE_ANALYSIS_ROLE: objects
      IMAGE_ANALYSIS_PORT: 8092
      IMAGE_ANALYSIS_MODEL_ROOT: /models/image_analysis/objects
      IMAGE_ANALYSIS_FAKE_MODE: ${IMAGE_ANALYSIS_FAKE_MODE:-0}
      IMAGE_ANALYSIS_RFDETR_DEVICE: ${IMAGE_ANALYSIS_RFDETR_DEVICE:-}
      HF_HOME: /models/image_analysis/objects/huggingface
      TORCH_HOME: /models/image_analysis/objects/torch
      XDG_CACHE_HOME: /models/image_analysis/objects/cache
      MPLCONFIGDIR: /tmp/matplotlib
    volumes:
      - ../models/image_analysis:/models/image_analysis

  image_analysis_captioning:
    build:
      context: ..
      dockerfile: infra/docker/image_analysis/Dockerfile
      target: captioning
      args:
        IMAGE_ANALYSIS_INSTALL_RUNTIME_DEPS: ${IMAGE_ANALYSIS_INSTALL_RUNTIME_DEPS:-0}
    image: vanessa-image-analysis-captioning:local
    container_name: vanessa-image-analysis-captioning
    profiles:
      - image_analysis
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    environment:
      IMAGE_ANALYSIS_ROLE: captioning
      IMAGE_ANALYSIS_PORT: 8093
      IMAGE_ANALYSIS_MODEL_ROOT: /models/image_analysis/captioning
      IMAGE_ANALYSIS_FAKE_MODE: ${IMAGE_ANALYSIS_FAKE_MODE:-0}
      HF_HOME: /models/image_analysis/captioning/huggingface
      TORCH_HOME: /models/image_analysis/captioning/torch
      XDG_CACHE_HOME: /models/image_analysis/captioning/cache
      MPLCONFIGDIR: /tmp/matplotlib
    volumes:
      - ../models/image_analysis:/models/image_analysis

  image_generation:
    build:
      context: ..
      dockerfile: infra/docker/image_generation/Dockerfile
      target: gateway
      args:
        IMAGE_GENERATION_INSTALL_RUNTIME_DEPS: "0"
    image: vanessa-image-generation-gateway:local
    container_name: vanessa-image-generation
    profiles:
      - image_generation
    ports:
      - "8094:8094"
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    environment:
      IMAGE_GENERATION_ROLE: gateway
      IMAGE_GENERATION_PORT: 8094
      IMAGE_GENERATION_MODEL_ROOT: /models/image_generation
      IMAGE_GENERATION_FAKE_MODE: ${IMAGE_GENERATION_FAKE_MODE:-0}
      IMAGE_GENERATION_WORKERS: ${IMAGE_GENERATION_WORKERS:-text_to_image,plate_logo}
      IMAGE_GENERATION_TEXT_TO_IMAGE_URL: ${IMAGE_GENERATION_TEXT_TO_IMAGE_URL:-http://image_generation_text_to_image:8095}
      IMAGE_GENERATION_PLATE_LOGO_URL: ${IMAGE_GENERATION_PLATE_LOGO_URL:-http://image_generation_plate_logo:8096}
      HF_HOME: /models/image_generation/gateway/huggingface
      TORCH_HOME: /models/image_generation/gateway/torch
      XDG_CACHE_HOME: /models/image_generation/gateway/cache
      MPLCONFIGDIR: /tmp/matplotlib
    volumes:
      - ../models/image_generation:/models/image_generation

  image_generation_text_to_image:
    build:
      context: ..
      dockerfile: infra/docker/image_generation/Dockerfile
      target: text-to-image
      args:
        IMAGE_GENERATION_INSTALL_RUNTIME_DEPS: ${IMAGE_GENERATION_INSTALL_RUNTIME_DEPS:-0}
    image: vanessa-image-generation-text-to-image:local
    container_name: vanessa-image-generation-text-to-image
    profiles:
      - image_generation
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    environment:
      IMAGE_GENERATION_ROLE: text_to_image
      IMAGE_GENERATION_PORT: 8095
      IMAGE_GENERATION_MODEL_ROOT: /models/image_generation/text_to_image
      IMAGE_GENERATION_FAKE_MODE: ${IMAGE_GENERATION_FAKE_MODE:-0}
      IMAGE_GENERATION_TEXT_TO_IMAGE_MODEL_ID: ${IMAGE_GENERATION_TEXT_TO_IMAGE_MODEL_ID:-segmind/tiny-sd}
      IMAGE_GENERATION_TEXT_TO_IMAGE_DEVICE: ${IMAGE_GENERATION_TEXT_TO_IMAGE_DEVICE:-cpu}
      IMAGE_GENERATION_TEXT_TO_IMAGE_DTYPE: ${IMAGE_GENERATION_TEXT_TO_IMAGE_DTYPE:-float32}
      HF_HOME: /models/image_generation/text_to_image/huggingface
      TORCH_HOME: /models/image_generation/text_to_image/torch
      XDG_CACHE_HOME: /models/image_generation/text_to_image/cache
      MPLCONFIGDIR: /tmp/matplotlib
    volumes:
      - ../models/image_generation:/models/image_generation

  image_generation_plate_logo:
    build:
      context: ..
      dockerfile: infra/docker/image_generation/Dockerfile
      target: plate-logo
      args:
        IMAGE_GENERATION_INSTALL_RUNTIME_DEPS: ${IMAGE_GENERATION_INSTALL_RUNTIME_DEPS:-0}
    image: vanessa-image-generation-plate-logo:local
    container_name: vanessa-image-generation-plate-logo
    profiles:
      - image_generation
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    environment:
      IMAGE_GENERATION_ROLE: plate_logo
      IMAGE_GENERATION_PORT: 8096
      IMAGE_GENERATION_MODEL_ROOT: /models/image_generation/plate_logo
      IMAGE_GENERATION_FAKE_MODE: ${IMAGE_GENERATION_FAKE_MODE:-0}
      HF_HOME: /models/image_generation/plate_logo/huggingface
      TORCH_HOME: /models/image_generation/plate_logo/torch
      XDG_CACHE_HOME: /models/image_generation/plate_logo/cache
      MPLCONFIGDIR: /tmp/matplotlib
    volumes:
      - ../models/image_generation:/models/image_generation

  agent_engine:
    build:
      context: ..
      dockerfile: infra/docker/agent_engine/Dockerfile
    container_name: vanessa-agent-engine
    ports:
      - "7000:7000"
    depends_on:
      - llm
      - weaviate
      - postgres
      - sandbox
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    environment:
      MCP_GATEWAY_SERVICE_TOKEN: ${MCP_GATEWAY_SERVICE_TOKEN:-dev-mcp-gateway-token}

  sandbox:
    build:
      context: ..
      dockerfile: infra/docker/sandbox/Dockerfile
    container_name: vanessa-sandbox
    ports:
      - "6000:6000"

  kws:
    build:
      context: ..
      dockerfile: infra/docker/kws/Dockerfile
    container_name: vanessa-kws
    ports:
      - "10400:10400"
    depends_on:
      - backend
    env_file:
      - path: .env.example
        required: true
      - path: .env.local
        required: false
    volumes:
      - ../models/kws:/models/kws:ro
    devices:
      - "/dev/snd:/dev/snd"

  weaviate:
    image: semitechnologies/weaviate:1.27.6
    container_name: vanessa-weaviate
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate

  postgres:
    image: postgres:16
    container_name: vanessa-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vanessa
      POSTGRES_PASSWORD: vanessa
      POSTGRES_DB: vanessa
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

volumes:
  weaviate_data:
  qdrant_data:
  searxng_data:
  postgres_data:
