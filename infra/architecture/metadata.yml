version: 1
rendering:
  group_order:
    - client
    - api
    - orchestration
    - runtime
    - data
  node_order:
    - frontend
    - backend
    - kws
    - agent_engine
    - llm
    - llm_runtime_inference
    - llm_runtime_embeddings
    - llama_cpp
    - searxng
    - mcp_gateway
    - image_analysis
    - image_analysis_anpr
    - image_analysis_objects
    - image_analysis_captioning
    - sandbox
    - weaviate
    - qdrant
    - postgres
services:
  frontend:
    label: Frontend
    group: client
    description: Browser UI and superadmin control panel.
    public_exposed: true
    criticality: medium
  backend:
    label: Backend API
    group: api
    description: Flask API gateway, model governance surface, catalog registry, and capability/provider control plane.
    public_exposed: true
    criticality: high
  kws:
    label: KWS
    group: api
    description: Wake-word service emitting voice events.
    public_exposed: true
    criticality: medium
  agent_engine:
    label: Agent Engine
    group: orchestration
    description: Multi-step agent workflows and tool orchestration.
    public_exposed: false
    criticality: high
  llm:
    label: LLM API
    group: runtime
    description: Private model-serving HTTP gateway.
    public_exposed: true
    criticality: high
  llm_runtime_inference:
    label: LLM Runtime Inference
    group: runtime
    description: Hardware-adaptive local vLLM runtime backing LLM inference on CPU or GPU hosts.
    public_exposed: false
    criticality: high
  llm_runtime_embeddings:
    label: LLM Runtime Embeddings
    group: runtime
    description: Hardware-adaptive local vLLM runtime backing embeddings on CPU or GPU hosts.
    public_exposed: false
    criticality: high
  llama_cpp:
    label: llama.cpp
    group: runtime
    description: Optional OpenAI-compatible llama.cpp runtime for alternate local inference.
    public_exposed: true
    criticality: medium
  sandbox:
    label: Sandbox
    group: runtime
    description: Isolated Python execution environment for agents.
    public_exposed: true
    criticality: high
  mcp_gateway:
    label: MCP Gateway
    group: runtime
    description: HTTP gateway that exposes authorized MCP server wrappers backed by catalog tools.
    public_exposed: true
    criticality: medium
  image_analysis:
    label: Image Analysis
    group: runtime
    description: Optional local image understanding gateway for selected plate recognition, object detection, and captioning workers.
    public_exposed: true
    criticality: medium
  image_analysis_anpr:
    label: Image Analysis ANPR
    group: runtime
    description: Private image-analysis worker for license plate detection and OCR.
    public_exposed: false
    criticality: medium
  image_analysis_objects:
    label: Image Analysis Objects
    group: runtime
    description: Private image-analysis worker for generic object detection.
    public_exposed: false
    criticality: medium
  image_analysis_captioning:
    label: Image Analysis Captioning
    group: runtime
    description: Private image-analysis worker for image captioning.
    public_exposed: false
    criticality: medium
  searxng:
    label: SearXNG
    group: runtime
    description: Local token-free metasearch backend used by the MCP gateway web search tool.
    public_exposed: false
    criticality: medium
  weaviate:
    label: Weaviate
    group: data
    description: Persistent vector index for RAG retrieval.
    public_exposed: true
    criticality: high
  qdrant:
    label: Qdrant
    group: data
    description: Optional vector database for alternate retrieval provider binding.
    public_exposed: true
    criticality: medium
  postgres:
    label: PostgreSQL
    group: data
    description: Persistent relational storage for auth and metadata.
    public_exposed: true
    criticality: high
edges:
  - from: frontend
    to: backend
    protocol: HTTP
    purpose: UI API requests
    kind: http
    direction: outbound
  - from: backend
    to: agent_engine
    protocol: HTTP
    purpose: Agent orchestration calls
    kind: http
    direction: outbound
  - from: backend
    to: llm
    protocol: HTTP
    purpose: Model inference and discovery
    kind: http
    direction: outbound
  - from: backend
    to: llama_cpp
    protocol: HTTP
    purpose: Optional direct llama.cpp inference via platform provider binding
    kind: http
    direction: outbound
  - from: backend
    to: sandbox
    protocol: HTTP
    purpose: Controlled code execution
    kind: http
    direction: outbound
  - from: backend
    to: mcp_gateway
    protocol: HTTP
    purpose: MCP provider checks and private gateway-backed tool adapters
    kind: http
    direction: outbound
  - from: backend
    to: image_analysis
    protocol: HTTP
    purpose: Optional image-analysis provider validation and superadmin smoke tests
    kind: http
    direction: outbound
  - from: backend
    to: weaviate
    protocol: HTTP
    purpose: Semantic retrieval operations
    kind: http
    direction: outbound
  - from: backend
    to: qdrant
    protocol: HTTP
    purpose: Optional semantic retrieval operations via alternate provider binding
    kind: http
    direction: outbound
  - from: backend
    to: postgres
    protocol: SQL
    purpose: Structured data access
    kind: db
    direction: outbound
  - from: agent_engine
    to: llm
    protocol: HTTP
    purpose: Agent LLM requests
    kind: http
    direction: outbound
  - from: agent_engine
    to: sandbox
    protocol: HTTP
    purpose: Agent sandbox execution
    kind: http
    direction: outbound
  - from: agent_engine
    to: mcp_gateway
    protocol: HTTP
    purpose: Agent MCP discovery and invocation with identity metadata
    kind: http
    direction: outbound
  - from: agent_engine
    to: image_analysis
    protocol: HTTP
    purpose: Agent image-analysis tool invocation through resolved platform runtime bindings
    kind: http
    direction: outbound
  - from: image_analysis
    to: image_analysis_anpr
    protocol: Internal HTTP
    purpose: License plate detection and OCR worker calls
    kind: internal
    direction: outbound
  - from: image_analysis
    to: image_analysis_objects
    protocol: Internal HTTP
    purpose: Object detection worker calls
    kind: internal
    direction: outbound
  - from: image_analysis
    to: image_analysis_captioning
    protocol: Internal HTTP
    purpose: Image captioning worker calls
    kind: internal
    direction: outbound
  - from: mcp_gateway
    to: searxng
    protocol: HTTP
    purpose: Web search queries through the local SearXNG JSON API
    kind: http
    direction: outbound
  - from: agent_engine
    to: weaviate
    protocol: HTTP
    purpose: Vector search and retrieval
    kind: http
    direction: outbound
  - from: agent_engine
    to: qdrant
    protocol: HTTP
    purpose: Optional vector search and retrieval via alternate provider binding
    kind: http
    direction: outbound
  - from: agent_engine
    to: postgres
    protocol: SQL
    purpose: Agent structured persistence
    kind: db
    direction: outbound
  - from: llm
    to: llm_runtime_inference
    protocol: Internal HTTP
    purpose: Runtime text generation path
    kind: internal
    direction: outbound
  - from: llm
    to: llm_runtime_embeddings
    protocol: Internal HTTP
    purpose: Runtime embeddings execution path
    kind: internal
    direction: outbound
  - from: kws
    to: backend
    protocol: HTTP webhook
    purpose: Wake event emission
    kind: event
    direction: outbound
